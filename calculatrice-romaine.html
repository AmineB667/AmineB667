<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculatrice Romaine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Georgia', serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      width: 340px;
    }

    .title {
      text-align: center;
      color: #c9a84c;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      border: 1px solid rgba(201,168,76,0.2);
    }

    .display .expression {
      color: rgba(201,168,76,0.5);
      font-size: 13px;
      min-height: 20px;
      letter-spacing: 1px;
      word-break: break-all;
      text-align: right;
    }

    .display .current {
      color: #e0d5b7;
      font-size: 28px;
      letter-spacing: 2px;
      word-break: break-all;
      text-align: right;
      margin-top: 6px;
    }

    .display .arabic-hint {
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      margin-top: 4px;
      font-family: monospace;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 0;
      height: 64px;
      font-family: 'Georgia', serif;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.12s ease;
      position: relative;
      overflow: hidden;
    }

    button:active { transform: scale(0.94); }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      opacity: 0;
      transition: opacity 0.1s;
    }

    button:hover::after { opacity: 1; }

    .btn-num {
      background: #1a2a4a;
      color: #e0d5b7;
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 15px;
      letter-spacing: 1px;
    }

    .btn-op {
      background: #c9a84c;
      color: #1a1a2e;
      font-weight: bold;
      font-size: 22px;
    }

    .btn-action {
      background: #0f3460;
      color: #c9a84c;
      border: 1px solid rgba(201,168,76,0.3);
      font-size: 14px;
      letter-spacing: 1px;
    }

    .btn-equals {
      background: linear-gradient(135deg, #c9a84c, #e8c96a);
      color: #1a1a2e;
      font-weight: bold;
      font-size: 22px;
      grid-column: span 2;
    }

    .btn-zero {
      grid-column: span 2;
    }

    .btn-clear {
      background: #7a1f1f;
      color: #ffb3b3;
      border: 1px solid rgba(255,100,100,0.2);
    }

    .error { color: #ff6b6b !important; font-size: 14px !important; }

    footer {
      text-align: center;
      color: rgba(201,168,76,0.3);
      font-size: 11px;
      margin-top: 18px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div class="calculator">
  <div class="title">Calculatrice · MMXXVI</div>

  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="current" id="current">·</div>
    <div class="arabic-hint" id="hint"></div>
  </div>

  <div class="buttons">
    <!-- Row 1 -->
    <button class="btn-action btn-clear" onclick="clearAll()">C</button>
    <button class="btn-action" onclick="toggleSign()">±</button>
    <button class="btn-action" onclick="percent()">%</button>
    <button class="btn-op" onclick="setOp('/')">÷</button>

    <!-- Row 2 -->
    <button class="btn-num" onclick="input(7)">VII</button>
    <button class="btn-num" onclick="input(8)">VIII</button>
    <button class="btn-num" onclick="input(9)">IX</button>
    <button class="btn-op" onclick="setOp('*')">×</button>

    <!-- Row 3 -->
    <button class="btn-num" onclick="input(4)">IV</button>
    <button class="btn-num" onclick="input(5)">V</button>
    <button class="btn-num" onclick="input(6)">VI</button>
    <button class="btn-op" onclick="setOp('-')">−</button>

    <!-- Row 4 -->
    <button class="btn-num" onclick="input(1)">I</button>
    <button class="btn-num" onclick="input(2)">II</button>
    <button class="btn-num" onclick="input(3)">III</button>
    <button class="btn-op" onclick="setOp('+')">+</button>

    <!-- Row 5 -->
    <button class="btn-num btn-zero" onclick="input(0)">·</button>
    <button class="btn-num" onclick="decimal()">·,·</button>
    <button class="btn-equals" onclick="calculate()">=</button>
  </div>

  <footer>SPQR · CALCVLATVS</footer>
</div>

<script>
  const ROMAN = [
    [1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],
    [100,'C'],[90,'XC'],[50,'L'],[40,'XL'],
    [10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']
  ];

  function toRoman(n) {
    if (!Number.isFinite(n)) return 'ERROREM';
    const neg = n < 0;
    n = Math.abs(n);

    if (n === 0) return '·';

    // Handle decimals
    const intPart = Math.floor(n);
    const decPart = Math.round((n - intPart) * 1000);

    let result = neg ? '−' : '';

    if (intPart > 0) {
      if (intPart > 3999999) return 'NIMIS';
      let num = intPart;
      for (const [val, sym] of ROMAN) {
        while (num >= val) { result += sym; num -= val; }
      }
    } else {
      result += '·';
    }

    if (decPart > 0) {
      result += ' · ';
      let d = decPart;
      for (const [val, sym] of ROMAN) {
        while (d >= val) { result += sym; d -= val; }
      }
    }

    return result;
  }

  function opSymbol(op) {
    return { '+':'+', '-':'−', '*':'×', '/':'÷' }[op] || op;
  }

  let current = '';
  let firstVal = null;
  let operator = null;
  let justCalculated = false;

  function updateDisplay() {
    const disp = document.getElementById('current');
    const hint = document.getElementById('hint');
    const expr = document.getElementById('expression');

    if (current === '' || current === '-') {
      disp.textContent = '·';
      hint.textContent = '';
    } else if (current === 'error') {
      disp.className = 'current error';
      disp.textContent = 'ERROREM';
      hint.textContent = '';
      return;
    } else {
      disp.className = 'current';
      const num = parseFloat(current);
      disp.textContent = toRoman(num);
      hint.textContent = current;
    }

    if (firstVal !== null && operator) {
      const fv = parseFloat(firstVal);
      expr.textContent = toRoman(fv) + ' ' + opSymbol(operator);
    } else {
      expr.textContent = '';
    }
  }

  function input(digit) {
    if (justCalculated) {
      current = '';
      firstVal = null;
      operator = null;
      justCalculated = false;
    }
    if (current === '0') current = String(digit);
    else current += String(digit);
    updateDisplay();
  }

  function decimal() {
    if (justCalculated) { current = '0'; justCalculated = false; }
    if (!current.includes('.')) {
      current = (current || '0') + '.';
    }
    updateDisplay();
  }

  function setOp(op) {
    justCalculated = false;
    if (current === '' && firstVal === null) return;

    if (current !== '' && firstVal !== null && operator) {
      calculate(true);
    }

    if (current !== '') {
      firstVal = current;
      current = '';
    }
    operator = op;
    updateDisplay();
  }

  function calculate(chain = false) {
    if (firstVal === null || operator === null || current === '') return;

    const a = parseFloat(firstVal);
    const b = parseFloat(current);
    let result;

    switch (operator) {
      case '+': result = a + b; break;
      case '-': result = a - b; break;
      case '*': result = a * b; break;
      case '/':
        if (b === 0) { current = 'error'; updateDisplay(); return; }
        result = a / b;
        break;
    }

    if (!chain) {
      document.getElementById('expression').textContent =
        toRoman(a) + ' ' + opSymbol(operator) + ' ' + toRoman(b) + ' =';
    }

    current = String(parseFloat(result.toFixed(10)));
    firstVal = null;
    operator = null;
    justCalculated = !chain;
    updateDisplay();
  }

  function clearAll() {
    current = '';
    firstVal = null;
    operator = null;
    justCalculated = false;
    document.getElementById('expression').textContent = '';
    updateDisplay();
  }

  function toggleSign() {
    if (!current || current === '0') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }

  function percent() {
    if (!current) return;
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  updateDisplay();
</script>
</body>
</html>
